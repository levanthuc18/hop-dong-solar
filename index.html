<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Hợp đồng Solar - Bảo mật</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/pizzip@3.1.4/dist/pizzip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docxtemplater@3.37.2/build/docxtemplater.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .input-group label { @apply block text-[10px] font-bold text-gray-500 uppercase mb-1 tracking-wider; }
        .input-group input, .input-group textarea { @apply w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all bg-white text-sm shadow-sm; }
        .card { @apply bg-white p-5 rounded-2xl shadow-sm border border-gray-100; }
        #authOverlay { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- MÀN HÌNH KHÓA MẬT KHẨU -->
    <div id="authOverlay" class="fixed inset-0 z-50 flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-sm w-full text-center">
            <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h2 class="text-xl font-black text-slate-800 mb-2 uppercase">Yêu cầu truy cập</h2>
            <p class="text-slate-500 text-sm mb-6">Vui lòng nhập mật khẩu để sử dụng công cụ xuất hợp đồng.</p>
            <input type="password" id="passInput" placeholder="Nhập mật khẩu..." class="w-full p-4 border border-slate-200 rounded-2xl mb-4 text-center text-lg focus:ring-2 focus:ring-blue-500 outline-none">
            <button id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl transition-all shadow-lg">ĐĂNG NHẬP</button>
            <p id="errorMsg" class="text-red-500 text-xs mt-4 hidden">Mật khẩu không chính xác!</p>
        </div>
    </div>

    <!-- NỘI DUNG CHÍNH (ẨN KHI CHƯA NHẬP MK) -->
    <div id="mainContent" class="max-w-5xl mx-auto hidden opacity-0 transition-opacity duration-700">
        <header class="mb-6 flex justify-between items-center">
            <h1 class="text-2xl font-black text-slate-800 uppercase tracking-tighter">Solar Doc v3.4</h1>
            <button onclick="location.reload()" class="text-[10px] font-bold text-slate-400 border border-slate-300 px-3 py-1 rounded-full hover:bg-slate-200 transition-colors">ĐĂNG XUẤT</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="space-y-6">
                <div class="card border-t-4 border-t-orange-500">
                    <label class="block text-xs font-black text-orange-600 uppercase mb-3 italic">1. Tải file Word mẫu (.docx)</label>
                    <input type="file" id="templateUpload" accept=".docx" class="text-xs w-full file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-orange-50 file:text-orange-700 cursor-pointer">
                </div>

                <div class="card border-t-4 border-t-blue-500 space-y-4">
                    <label class="block text-xs font-black text-blue-600 uppercase italic">2. Thông tin hợp đồng</label>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="input-group"><label>Số HĐ</label><input type="text" id="contractNo" value="01/2026/HĐNT/XT_AT"></div>
                        <div class="input-group"><label>Ngày ký</label><input type="date" id="contractDate"></div>
                    </div>
                    <div class="input-group"><label>Tên khách hàng</label><input type="text" id="customerName" placeholder="NGUYỄN VĂN A" class="uppercase font-bold"></div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="input-group"><label>CCCD</label><input type="text" id="cccd"></div>
                        <div class="input-group"><label>Số điện thoại</label><input type="text" id="phone"></div>
                    </div>
                    <div class="input-group"><label>Địa chỉ</label><textarea id="address" rows="2"></textarea></div>
                    <div class="input-group"><label>Tổng tiền (VNĐ)</label><input type="number" id="totalValue" value="187600000" class="text-blue-700 font-black text-lg"></div>
                </div>
            </div>

            <div class="space-y-6">
                <!-- PHẦN ĐẶT TÊN FILE -->
                <div class="card border-l-4 border-l-purple-500">
                    <div class="input-group">
                        <label>3. Tên file khi tải về (Không cần đuôi .docx)</label>
                        <input type="text" id="customFileName" placeholder="Ví dụ: Hop_dong_anh_Thanh_Gia_Lam" class="bg-purple-50 border-purple-200">
                        <p class="text-[9px] text-slate-400 mt-1 italic">* Để trống sẽ tự đặt theo tên khách hàng.</p>
                    </div>
                </div>

                <!-- XEM TRƯỚC -->
                <div class="card bg-slate-900 text-white min-h-[350px] flex flex-col shadow-2xl">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Xem trước thanh toán</h2>
                        <button id="generateBtn" class="bg-blue-600 hover:bg-blue-500 px-5 py-2.5 rounded-xl font-bold text-xs transition-all flex items-center shadow-lg">
                            XUẤT FILE WORD
                        </button>
                    </div>

                    <div class="space-y-6 flex-grow">
                        <div class="border-l-2 border-blue-500 pl-4">
                            <p class="text-[10px] text-blue-400 font-bold uppercase mb-1">Đợt 1: Tạm ứng (20%)</p>
                            <p id="viewS1Val" class="text-xl font-black">0 <span class="text-xs italic">VNĐ</span></p>
                            <p id="viewS1Text" class="text-[10px] text-slate-400 italic mt-1 leading-relaxed">...</p>
                        </div>

                        <div class="border-l-2 border-green-500 pl-4">
                            <p class="text-[10px] text-green-400 font-bold uppercase mb-1">Đợt 2: Hoàn thành (80%)</p>
                            <p id="viewS2Val" class="text-xl font-black">0 <span class="text-xs italic">VNĐ</span></p>
                            <p id="viewS2Text" class="text-[10px] text-slate-400 italic mt-1 leading-relaxed">...</p>
                        </div>
                        
                        <div class="mt-auto pt-6 border-t border-slate-800">
                            <p class="text-[10px] text-slate-500 uppercase font-bold mb-1 text-right">Tổng giá trị</p>
                            <p id="viewTotalVal" class="text-3xl font-black text-yellow-400 text-right">0 <span class="text-xs text-white italic">VNĐ</span></p>
                        </div>
                    </div>
                    <div id="statusMsg" class="mt-4 text-[10px] text-center p-2 rounded hidden"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // MẬT KHẨU TRUY CẬP
        const MY_PASSWORD = "123"; 

        document.getElementById('loginBtn').onclick = function() {
            const pin = document.getElementById('passInput').value;
            if(pin === MY_PASSWORD) {
                document.getElementById('authOverlay').classList.add('hidden');
                const main = document.getElementById('mainContent');
                main.classList.remove('hidden');
                setTimeout(() => main.classList.add('opacity-100'), 50);
            } else {
                document.getElementById('errorMsg').classList.remove('hidden');
                document.getElementById('passInput').value = "";
            }
        };

        document.getElementById('passInput').onkeydown = (e) => { if(e.key === "Enter") document.getElementById('loginBtn').click(); };

        function docSoTiengViet(number) {
            if (number === 0) return "Không đồng";
            const units = ["", "nghìn", "triệu", "tỷ", "nghìn tỷ", "triệu tỷ"];
            const digits = ["không", "một", "hai", "ba", "bốn", "năm", "sáu", "bảy", "tám", "chín"];
            function readThreeDigits(n, isLastGroup) {
                let h = Math.floor(n / 100), t = Math.floor((n % 100) / 10), u = n % 10, res = "";
                if (h > 0) res += digits[h] + " trăm "; else if (!isLastGroup) res += "không trăm ";
                if (t > 1) { res += digits[t] + " mươi "; if (u === 1) res += "mốt"; else if (u === 5) res += "lăm"; else if (u > 0) res += digits[u]; }
                else if (t === 1) { res += "mười "; if (u === 5) res += "lăm"; else if (u > 0) res += digits[u]; }
                else if (u > 0) { if (h > 0 || !isLastGroup) res += "linh "; res += digits[u]; }
                return res;
            }
            let str = Math.round(number).toString(), groups = [];
            while (str.length > 0) { groups.push(str.substring(Math.max(0, str.length - 3), str.length)); str = str.substring(0, Math.max(0, str.length - 3)); }
            let result = "";
            for (let i = groups.length - 1; i >= 0; i--) {
                let g = parseInt(groups[i]);
                if (g > 0) result += readThreeDigits(g, i === groups.length - 1) + " " + units[i] + " ";
            }
            let final = result.trim().replace(/\s+/g, ' ');
            return final.charAt(0).toUpperCase() + final.slice(1) + " đồng.";
        }

        const format = (n) => new Intl.NumberFormat('vi-VN').format(Math.round(n));

        function update() {
            const total = parseFloat(document.getElementById('totalValue').value) || 0;
            const s1 = total * 0.2, s2 = total * 0.8;
            document.getElementById('viewTotalVal').innerHTML = `${format(total)} <span class="text-xs text-white italic font-bold">VNĐ</span>`;
            document.getElementById('viewS1Val').innerHTML = `${format(s1)} <span class="text-xs text-blue-400 italic font-bold">VNĐ</span>`;
            document.getElementById('viewS2Val').innerHTML = `${format(s2)} <span class="text-xs text-green-400 italic font-bold">VNĐ</span>`;
            document.getElementById('viewS1Text').innerText = docSoTiengViet(s1);
            document.getElementById('viewS2Text').innerText = docSoTiengViet(s2);
        }

        document.getElementById('generateBtn').onclick = function() {
            const fileInput = document.getElementById('templateUpload');
            const status = document.getElementById('statusMsg');
            if (!fileInput.files[0]) {
                status.innerText = "LỖI: CHƯA CHỌN FILE MẪU!";
                status.className = "mt-4 text-[10px] text-center p-2 rounded bg-red-900 text-red-200 block";
                return;
            }
            status.innerText = "ĐANG XỬ LÝ...";
            status.className = "mt-4 text-[10px] text-center p-2 rounded bg-blue-900 text-blue-200 block";
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const zip = new PizZip(e.target.result);
                    const doc = new window.docxtemplater(zip, { paragraphLoop: true, linebreaks: true });
                    const total = parseFloat(document.getElementById('totalValue').value) || 0;
                    const d = document.getElementById('contractDate').value ? new Date(document.getElementById('contractDate').value) : new Date();
                    
                    const customerNameRaw = document.getElementById('customerName').value || "Khach_hang";
                    const fileNameInput = document.getElementById('customFileName').value.trim();
                    const finalFileName = fileNameInput ? fileNameInput : `HD_Solar_${customerNameRaw}`;

                    doc.setData({
                        contractNo: document.getElementById('contractNo').value,
                        customerName: customerNameRaw.toUpperCase(),
                        cccd: document.getElementById('cccd').value,
                        phone: document.getElementById('phone').value,
                        address: document.getElementById('address').value,
                        totalValue: `${format(total)} VNĐ`,
                        totalText: docSoTiengViet(total),
                        s1Value: `${format(total*0.2)} VNĐ`,
                        s1Text: docSoTiengViet(total*0.2),
                        s2Value: `${format(total*0.8)} VNĐ`,
                        s2Text: docSoTiengViet(total*0.8),
                        day: String(d.getDate()).padStart(2, '0'),
                        month: String(d.getMonth() + 1).padStart(2, '0'),
                        year: d.getFullYear()
                    });
                    doc.render();
                    saveAs(doc.getZip().generate({ type: "blob" }), `${finalFileName}.docx`);
                    status.innerText = "THÀNH CÔNG!";
                    status.className = "mt-4 text-[10px] text-center p-2 rounded bg-green-900 text-green-200 block";
                } catch (err) {
                    status.innerText = "LỖI XỬ LÝ FILE!";
                    status.className = "mt-4 text-[10px] text-center p-2 rounded bg-red-900 text-red-200 block";
                }
            };
            reader.readAsArrayBuffer(fileInput.files[0]);
        };

        window.onload = () => {
            ['contractNo', 'customerName', 'cccd', 'phone', 'address', 'totalValue', 'contractDate'].forEach(id => document.getElementById(id).oninput = update);
            document.getElementById('contractDate').valueAsDate = new Date();
            update();
        };
    </script>
</body>
</html>
